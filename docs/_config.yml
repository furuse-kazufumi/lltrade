# GitHub Pages (Jekyll) — lltrade product page

title: "lltrade"
description: "Trading research for the FullSense LLM family — PAPER-TRADING ONLY (v0.x). LLM-assisted backtest gated by llive Approval Bus. Apache-2.0."
remote_theme: just-the-docs/just-the-docs
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-remote-theme
relative_links:
  enabled: true
  collections: true

color_scheme: light
search_enabled: true
heading_anchors: true
mermaid:
  version: "10.9.0"
aux_links:
  "FullSense":
    - "https://furuse-kazufumi.github.io/fullsense/"
  "llive":
    - "https://furuse-kazufumi.github.io/llive/"
  "llove":
    - "https://furuse-kazufumi.github.io/llove/"
  "llmesh":
    - "https://furuse-kazufumi.github.io/llmesh/"
aux_links_new_tab: true
footer_content: 'Copyright &copy; 2026 Kazufumi Furuse. lltrade ™ part of the FullSense ™ family. Paper-trading only (v0.x). Not financial advice. Code under Apache-2.0.'
nav_external_links:
  - title: GitHub
    url: https://github.com/furuse-kazufumi/lltrade
    hide_icon: false
back_to_top: true
back_to_top_text: "Back to top"

defaults:
  - scope:
      path: ""
    values:
      layout: default
author: Kazufumi Furuse
url: https://furuse-kazufumi.github.io/lltrade
baseurl: ""
twitter:
  card: summary_large_image
